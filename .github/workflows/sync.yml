name: Registry Sync

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC
    - cron: '0 2 * * 0'  # Weekly full sync Sunday 2 AM
  workflow_dispatch:
    inputs:
      full:
        description: 'Full sync'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    name: Sync Registries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: Sync Registries
        run: npm run sync --workspace=cli -- ${{ github.event.inputs.full == 'true' && '--full' || '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - name: Commit Updated Registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/registry/data/
          git diff --staged --quiet || git commit -m "chore: update registry data [skip ci]"
          git push
